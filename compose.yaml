services:
  rpc-proxy:
    build:
      context: ./services/rpc-proxy
    environment:
      LISTEN_ADDR: ":8080"
      UPSTREAM_URL: "https://polygon.drpc.org"
      MAX_REQUEST_BYTES: "10485760"
      UPSTREAM_RESPONSE_HEADER_TIMEOUT: "30s"
      SHUTDOWN_TIMEOUT: "15s"
      LOG_LEVEL: "info"
    ports:
      - "127.0.0.1:8080:8080"
    restart: unless-stopped
    stop_grace_period: 20s
