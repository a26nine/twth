name: RPC Proxy Deployment

on:
  workflow_dispatch:
    inputs:
      image_version:
        description: SemVer GHCR release version to promote, such as 0.1.0
        required: true
        type: string

permissions:
  attestations: read
  contents: read
  id-token: write
  packages: read

concurrency:
  group: twth-aws-production
  cancel-in-progress: false

env:
  AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: ${{ vars.AWS_ROLE_ARN }}
  IMAGE_NAME: ghcr.io/a26nine/twth-rpc-proxy
  IMAGE_VERSION: ${{ inputs.image_version }}
  PUBLIC_HOSTNAME: ${{ vars.PUBLIC_HOSTNAME }}
  TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}

jobs:
  deployment:
    name: Deployment
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Verify required repository variables
        shell: bash
        run: |
          set -euo pipefail
          [[ "${AWS_ACCOUNT_ID}" =~ ^[0-9]{12}$ ]]
          [[ "${AWS_ROLE_ARN}" == "arn:aws:iam::${AWS_ACCOUNT_ID}:role/twth-github-deploy" ]]
          [[ "${TF_STATE_BUCKET}" == "twth-terraform-state-${AWS_ACCOUNT_ID}" ]]
          [[ -n "${PUBLIC_HOSTNAME}" ]]
          semver_regex='^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-((0|[1-9][0-9]*)|([0-9]*[A-Za-z-][0-9A-Za-z-]*))(\.((0|[1-9][0-9]*)|([0-9]*[A-Za-z-][0-9A-Za-z-]*)))*)?$'
          [[ "${IMAGE_VERSION}" =~ ${semver_regex} ]]
          (( ${#IMAGE_VERSION} <= 128 ))

      - name: Configure AWS credentials through GitHub OIDC
        uses: aws-actions/configure-aws-credentials@acca2b1b2070338fb9fd1ca27ecee81d687e58e5 # v6.1.2
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          role-session-name: twth-${{ github.run_id }}
          mask-aws-account-id: true

      - name: Verify AWS account
        shell: bash
        run: |
          set -euo pipefail
          actual_account_id="$(aws sts get-caller-identity --query Account --output text)"
          [[ "${actual_account_id}" == "${AWS_ACCOUNT_ID}" ]]

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Initialize shared application state
        run: make backend-init AWS_PROFILE=

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve immutable GHCR digest
        id: image
        shell: bash
        run: |
          set -euo pipefail
          manifest="$(docker buildx imagetools inspect \
            --format '{{json .Manifest}}' "${IMAGE_NAME}:${IMAGE_VERSION}")"
          digest="$(jq -r '.digest // empty' <<< "${manifest}")"
          [[ "${digest}" =~ ^sha256:[0-9a-f]{64}$ ]]
          jq -e '
            .manifests
            | any(.platform.os == "linux" and .platform.architecture == "amd64")
          ' <<< "${manifest}" >/dev/null
          {
            echo "IMAGE_DIGEST=${digest}"
            echo "IMAGE_URI=${IMAGE_NAME}@${digest}"
          } >> "${GITHUB_ENV}"

      - name: Verify GHCR image provenance
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh attestation verify "oci://${IMAGE_URI}" \
            --repo "${GITHUB_REPOSITORY}" \
            --signer-workflow "${GITHUB_REPOSITORY}/.github/workflows/rpc-proxy-release.yml" \
            --source-ref "refs/tags/rpc-proxy/v${IMAGE_VERSION}"

      - name: Deploy ECS service
        run: make deploy AWS_PROFILE=

      - name: Run live smoke tests
        run: make smoke AWS_PROFILE=
