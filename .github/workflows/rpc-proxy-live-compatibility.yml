name: RPC Proxy Live Compatibility

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live_compatibility:
    name: Live Compatibility
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/rpc-proxy
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: services/rpc-proxy/go.mod
          cache: false

      - name: Run live compatibility test
        env:
          RPC_LIVE: "1"
        run: go test -race -count=1 -v -run '^TestLiveRPCCompatibility$' ./internal/proxy
