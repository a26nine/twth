name: RPC Proxy Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  go-tests:
    name: Deterministic Go tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/rpc-proxy
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: services/rpc-proxy/go.mod
          cache: false
      - name: Run deterministic tests
        run: go test -race -count=1 ./...

  rpc-live:
    name: Live RPC compatibility
    needs: go-tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/rpc-proxy
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Set up Go
        uses: actions/setup-go@d35c59abb061a4a6fb18e82ac0862c26744d6ab5 # v5.5.0
        with:
          go-version-file: services/rpc-proxy/go.mod
          cache: false
      - name: Compare proxy with public RPC
        env:
          RPC_LIVE: "1"
        run: go test -race -count=1 -v -run '^TestLiveRPCCompatibility$' ./internal/proxy
