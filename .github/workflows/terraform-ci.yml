name: Terraform CI

on:
  pull_request:
    paths:
      - "infra/**"
      - ".github/workflows/terraform-ci.yml"
  push:
    branches:
      - main
    paths:
      - "infra/**"
      - ".github/workflows/terraform-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  terraform:
    name: Terraform
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: 1.15.8
          terraform_wrapper: false

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive infra

      - name: Validate and test bootstrap root
        run: |
          terraform -chdir=infra/bootstrap init -backend=false -lockfile=readonly -input=false
          terraform -chdir=infra/bootstrap validate
          terraform -chdir=infra/bootstrap test

      - name: Validate and test application root
        run: |
          terraform -chdir=infra/terraform init -backend=false -lockfile=readonly -input=false
          terraform -chdir=infra/terraform validate
          terraform -chdir=infra/terraform test
