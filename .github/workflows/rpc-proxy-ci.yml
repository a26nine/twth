name: RPC Proxy CI

on:
  pull_request:
    paths:
      - 'services/rpc-proxy/**'
      - '.github/workflows/rpc-proxy-ci.yml'
  push:
    branches:
      - main
    paths:
      - 'services/rpc-proxy/**'
      - '.github/workflows/rpc-proxy-ci.yml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go_quality:
    name: Go Quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    defaults:
      run:
        working-directory: services/rpc-proxy
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: services/rpc-proxy/go.mod
          cache-dependency-path: services/rpc-proxy/go.mod

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l .)"
          if [[ -n "${unformatted}" ]]; then
            echo "The following Go files are not formatted:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run Go vet
        run: go vet ./...

      - name: Run tests with race detector
        run: go test -race ./...

  container_build:
    name: Container Build
    needs: go_quality
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0

      - name: Build container image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: services/rpc-proxy
          file: services/rpc-proxy/Dockerfile
          platforms: linux/amd64
          push: false
          build-args: |
            VERSION=dev
            COMMIT=${{ github.sha }}
          cache-from: type=gha,scope=rpc-proxy-ci
          cache-to: type=gha,mode=max,scope=rpc-proxy-ci
